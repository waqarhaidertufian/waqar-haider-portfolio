<!DOCTYPE html>
<html>
<head>
    <title>QR Code for Portfolio</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #0f172a;
            font-family: Arial, sans-serif;
        }
        .container {
            text-align: center;
            background: #1e293b;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        h1 {
            color: #06b6d4;
            margin-bottom: 20px;
        }
        img {
            border: 4px solid #06b6d4;
            border-radius: 10px;
            margin: 20px 0;
        }
        p {
            color: #94a3b8;
            font-size: 18px;
        }
        .url {
            color: #22d3ee;
            font-weight: bold;
            font-size: 20px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 Scan to View Portfolio</h1>
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=http://192.168.0.103:3000" alt="QR Code">
        <p>Scan this QR code with your phone</p>
        <p class="url">http://192.168.0.103:3000</p>
        <p style="font-size: 14px; margin-top: 30px;">Make sure your phone is on the same WiFi network</p>
    </div>
</body>
</html>
